app = 'hr-threads-agent'
primary_region = 'sin'

[build]
[mounts]
  source = "agent_data"
  destination = "/data"

[env]
  DATA_DIR = "/data"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
